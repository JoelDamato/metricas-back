<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingresar | Métricas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/metricas-assets/favicon-m.svg" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="ranking-page auth-page login-page">
    <main class="container auth-container">
      <div class="metricas-login-logo" aria-hidden="true">
        <img src="/metricas-assets/mati-randazzo-logo-web.png" alt="Mati Randazzo" />
      </div>
      <section class="card auth-card">
        <form id="loginForm" class="auth-form">
          <label>
            <span class="auth-label-head">
              <span class="auth-label-icon" aria-hidden="true">✉</span>
              <span>Email</span>
            </span>
            <input id="email" type="email" autocomplete="username" placeholder="Ingresá tu email" required />
          </label>
          <label>
            <span class="auth-label-head">
              <span class="auth-label-icon" aria-hidden="true">🔒</span>
              <span>Contraseña</span>
            </span>
            <span class="auth-password-wrap">
              <input id="password" type="password" autocomplete="current-password" placeholder="Ingresá tu contraseña" required />
              <span class="auth-password-icon" aria-hidden="true">◔</span>
            </span>
          </label>
          <button type="submit">Ingresar</button>
        </form>
        <p id="authStatus"></p>
      </section>
      <p class="auth-login-foot">
        <span class="auth-login-foot-icon" aria-hidden="true">🛡</span>
        <span>Acceso seguro y monitoreado</span>
      </p>
    </main>
    <script src="/js/api/http.js"></script>
    <script src="/js/auth/login.page.js"></script>
  </body>
</html>
