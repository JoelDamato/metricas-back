<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Informe Por Respuestas | Métricas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/metricas/css/styles.css" />
  </head>
  <body class="ranking-page leads-page">
    <main class="container">
      <div class="nav"><a href="/metricas">Volver al listado</a></div>
      <section class="ranking-hero">
        <h1>Informe Por Respuestas</h1>
        <p>Desglose por respuestas tomado desde la base de leads y filtrado por fecha de agenda.</p>
      </section>

      <div class="actions ranking-actions leads-actions">
        <label>
          Desde
          <input id="desde" type="date" />
        </label>
        <label>
          Hasta
          <input id="hasta" type="date" />
        </label>
        <button id="reload">Buscar</button>
      </div>

      <p id="status"></p>
      <section id="tableContainer"></section>
    </main>

    <div id="loadingPopup" class="loading-popup" hidden>
      <div class="loading-popup-card">
        <div class="loading-logo" aria-hidden="true">MR</div>
        <p>Cargando informe...</p>
      </div>
    </div>

    <script src="/metricas/js/api/http.js"></script>
    <script src="/metricas/js/api/metricas.api.js"></script>
    <script src="/metricas/js/views/leads-bdd.page.js"></script>
  </body>
</html>
