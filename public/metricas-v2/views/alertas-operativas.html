<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alertas Operativas | Métricas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="ranking-page alertas-page">
    <main class="container">
      <div class="nav alertas-back-nav"><a href="/index.html">← Volver al listado</a></div>
      <section class="ranking-hero alertas-hero">
        <div class="alertas-hero-icon" aria-hidden="true"></div>
        <h1>Alertas Operativas</h1>
        <p>Casos que requieren atención hoy divididos por Comercial, CSM y Administración.</p>
        <div class="alertas-hero-art" aria-hidden="true"></div>
      </section>

      <section class="alertas-panel-shell">
        <section class="ranking-actions alertas-toolbar">
          <div class="alertas-toolbar-meta">
            <span id="alertasFechaCorte" class="alertas-toolbar-pill"></span>
            <span id="alertasLastUpdate" class="alertas-toolbar-pill alertas-toolbar-pill-soft"></span>
          </div>
          <button id="reloadAlertas" type="button">Actualizar</button>
        </section>

        <section id="alertasLoading" class="alertas-loading" hidden>
          <div class="loading-logo" aria-hidden="true">MR</div>
          <p>Cargando alertas operativas...</p>
        </section>
        <p id="status" class="alertas-status"></p>
        <section id="alertasAreaSummary" class="alertas-area-summary"></section>
        <section id="alertasSummary" class="alertas-summary-grid"></section>
      </section>
      <section id="alertasSections" class="alertas-sections"></section>
    </main>

    <script src="/js/api/http.js"></script>
    <script src="/js/api/metricas.api.js"></script>
    <script src="/js/auth-shell.js"></script>
    <script src="/js/views/alertas-operativas.page.js"></script>
  </body>
</html>
