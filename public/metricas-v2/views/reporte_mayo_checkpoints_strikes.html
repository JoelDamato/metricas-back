<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Mensual - Checkpoints, Strikes, KPIs y Bonus</title>
  <style>
    :root{
      --bg:#08111f;
      --bg-soft:#0d1728;
      --card:#111f34;
      --card-2:#162742;
      --line:#243757;
      --text:#eef4ff;
      --muted:#9eb0cf;
      --green:#3ddc97;
      --green-soft:rgba(61,220,151,.14);
      --red:#ff6b6b;
      --red-soft:rgba(255,107,107,.14);
      --gold:#f5c451;
      --gold-soft:rgba(245,196,81,.16);
      --blue:#69a7ff;
      --blue-soft:rgba(105,167,255,.14);
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(105,167,255,.14), transparent 28%),
        radial-gradient(circle at top left, rgba(61,220,151,.08), transparent 26%),
        linear-gradient(180deg, #07101d 0%, #091423 100%);
      color:var(--text);
    }
    .page{
      width:min(1240px, calc(100vw - 32px));
      margin:0 auto;
      padding:28px 0 56px;
    }
    .hero{
      background:linear-gradient(135deg, rgba(105,167,255,.16), rgba(17,31,52,.92) 45%, rgba(245,196,81,.12));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .hero::after{
      content:"";
      position:absolute;
      inset:auto -40px -60px auto;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(245,196,81,.24), transparent 70%);
      pointer-events:none;
    }
    .eyebrow{
      color:var(--gold);
      font-size:12px;
      font-weight:700;
      letter-spacing:.16em;
      text-transform:uppercase;
    }
    h1{
      margin:10px 0 8px;
      font-size:clamp(2rem, 5vw, 3.35rem);
      line-height:1.02;
    }
    .hero p{
      margin:0;
      max-width:760px;
      color:var(--muted);
      line-height:1.65;
      font-size:15px;
    }
    .hero-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
    }
    .month-picker{
      display:grid;
      gap:6px;
      min-width:220px;
    }
    .month-picker label{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:700;
    }
    .month-picker input{
      height:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(8,17,31,.6);
      color:var(--text);
      padding:0 14px;
      font:inherit;
    }
    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--card);
      color:var(--text);
      padding:11px 16px;
      border-radius:999px;
      text-decoration:none;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }
    .btn.primary{
      background:linear-gradient(135deg, rgba(245,196,81,.22), rgba(245,196,81,.1));
      border-color:rgba(245,196,81,.32);
      color:#fff6d8;
    }
    .summary-grid{
      display:grid;
      grid-template-columns:repeat(5, minmax(0,1fr));
      gap:14px;
      margin-top:20px;
    }
    .stat{
      background:rgba(8,17,31,.48);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
      backdrop-filter:blur(10px);
    }
    .stat-label{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .stat-value{
      margin-top:7px;
      font-size:1.48rem;
      font-weight:700;
    }
    .section{
      margin-top:24px;
    }
    .section-head{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }
    .section-head h2{
      margin:0;
      font-size:1.2rem;
    }
    .section-head p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }
    .panel{
      background:linear-gradient(180deg, rgba(18,31,52,.96), rgba(12,22,38,.96));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .two-col{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:18px;
    }
    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .chip{
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }
    .chip.check{background:var(--green-soft);color:var(--green);border-color:rgba(61,220,151,.22)}
    .chip.strike{background:var(--red-soft);color:var(--red);border-color:rgba(255,107,107,.24)}
    .chip.bonus{background:var(--gold-soft);color:var(--gold);border-color:rgba(245,196,81,.24)}
    .chip.neutral{background:var(--blue-soft);color:var(--blue);border-color:rgba(105,167,255,.24)}
    .exec-list{
      display:grid;
      gap:10px;
      margin:0;
      padding:0;
      list-style:none;
    }
    .exec-list li{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      color:#d9e5fb;
      line-height:1.6;
      font-size:14px;
    }
    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--gold);
      margin-top:7px;
      flex:0 0 auto;
      box-shadow:0 0 16px rgba(245,196,81,.65);
    }
    .closers-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .closer-card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:16px;
    }
    .closer-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .closer-name{
      margin:0;
      font-size:1.02rem;
    }
    .score-pill{
      min-width:62px;
      text-align:center;
      padding:8px 10px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
      border:1px solid rgba(255,255,255,.08);
      background:var(--bg-soft);
    }
    .score-positive{color:var(--green); background:var(--green-soft); border-color:rgba(61,220,151,.24)}
    .score-neutral{color:var(--blue); background:var(--blue-soft); border-color:rgba(105,167,255,.24)}
    .score-negative{color:var(--red); background:var(--red-soft); border-color:rgba(255,107,107,.24)}
    .subblock{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.08);
    }
    .subblock h3{
      margin:0 0 8px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }
    .reason-list{
      margin:0;
      padding-left:18px;
      color:#dbe6fb;
      line-height:1.6;
      font-size:14px;
    }
    .reason-list li+li{margin-top:6px}
    .reason-list.empty{
      padding-left:0;
      list-style:none;
      color:var(--muted);
    }
    .ranking-table,
    .data-table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
    }
    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:18px;
    }
    th,td{
      padding:13px 14px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,.07);
      font-size:14px;
    }
    th{
      background:rgba(255,255,255,.04);
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:11px;
    }
    tr:last-child td{border-bottom:none}
    .align-r{text-align:right}
    .rank-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      padding:5px 8px;
      border-radius:999px;
      background:var(--gold-soft);
      color:var(--gold);
      font-weight:700;
      font-size:12px;
      border:1px solid rgba(245,196,81,.24);
    }
    .bar-list{
      display:grid;
      gap:12px;
    }
    .bar-row{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      padding:12px 14px;
    }
    .bar-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
      font-size:14px;
    }
    .bar-track{
      height:12px;
      background:#08111f;
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.05);
    }
    .bar-fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, #f5c451, #69a7ff);
    }
    .bonus-callout{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }
    .callout{
      padding:15px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }
    .callout strong{
      display:block;
      margin-top:6px;
      font-size:1.2rem;
    }
    .footnote{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }
    .empty-state{
      margin-top:24px;
      background:linear-gradient(180deg, rgba(18,31,52,.96), rgba(12,22,38,.96));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:36px 24px;
      text-align:center;
    }
    .empty-state h2{
      margin:0 0 10px;
      font-size:1.4rem;
    }
    .empty-state p{
      margin:0;
      color:var(--muted);
      line-height:1.65;
    }
    @media (max-width: 1080px){
      .summary-grid,
      .closers-grid,
      .bonus-callout{grid-template-columns:repeat(2, minmax(0,1fr))}
      .two-col{grid-template-columns:1fr}
    }
    @media (max-width: 700px){
      .page{width:min(100vw - 16px, 1240px); padding:16px 0 34px}
      .hero{padding:20px}
      .summary-grid,
      .closers-grid,
      .bonus-callout{grid-template-columns:1fr}
      h1{font-size:2rem}
      th,td{padding:11px 10px}
    }
  </style>
</head>
<body>
  <main class="page">
    <div id="reportRoot"></div>
  </main>
  <script>

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderEmpty(monthValue){
      return `
        <section class="hero">
          <div class="hero-top">
            <div>
              <div class="eyebrow">Reporte Mensual - Sin datos</div>
              <h1>Checkpoints, Strikes, KPIs y Bonus</h1>
              <p>Todavia no hay un reporte cargado para el mes seleccionado.</p>
            </div>
            <div class="month-picker">
              <label for="reportMonth">Mes del reporte</label>
              <input id="reportMonth" type="month" value="${escapeHtml(monthValue)}" />
            </div>
          </div>
          <div class="hero-actions">
            <a class="btn primary" href="/views/reporte_mayo_checkpoints_strikes.html" download="reporte_mayo_checkpoints_strikes.html">Descargar HTML</a>
            <button class="btn" type="button" onclick="window.print()">Imprimir / Exportar</button>
          </div>
        </section>
        <section class="empty-state">
          <h2>No hay datos para ${escapeHtml(monthValue || 'ese mes')}</h2>
          <p>Por ahora esta vista tiene cargado el reporte de <strong>mayo 2026</strong>. La estructura ya quedo preparada para sumar otros meses despues.</p>
        </section>
      `;
    }

    function renderReport(monthValue, data){
      return `
        <section class="hero">
          <div class="hero-top">
            <div>
              <div class="eyebrow">Reporte Mensual - ${escapeHtml(data.monthLabel)}</div>
              <h1>${escapeHtml(data.title)}</h1>
              <p>${escapeHtml(data.description)}</p>
            </div>
            <div class="month-picker">
              <label for="reportMonth">Mes del reporte</label>
              <input id="reportMonth" type="month" value="${escapeHtml(monthValue)}" />
            </div>
          </div>
          <div class="hero-actions">
            <a class="btn primary" href="/views/reporte_mayo_checkpoints_strikes.html" download="reporte_mayo_checkpoints_strikes.html">Descargar HTML</a>
            <button class="btn" type="button" onclick="window.print()">Imprimir / Exportar</button>
          </div>
          <div class="summary-grid">
            ${data.summary.map(([label, value]) => `
              <article class="stat">
                <div class="stat-label">${escapeHtml(label)}</div>
                <div class="stat-value">${escapeHtml(value)}</div>
              </article>
            `).join('')}
          </div>
        </section>

        <section class="section two-col">
          <div class="panel">
            <div class="section-head"><div><h2>Resumen Ejecutivo</h2><p>Panorama general del mes y lectura rapida del sistema.</p></div></div>
            <ul class="exec-list">
              ${data.executive.map((item) => `<li><span class="dot"></span><span>${escapeHtml(item)}</span></li>`).join('')}
            </ul>
          </div>
          <div class="panel">
            <div class="section-head"><div><h2>Sistema de Puntaje</h2><p>Base usada para el ranking y las consecuencias.</p></div></div>
            <div class="chips">
              <span class="chip check">Checkpoint = +1 punto</span>
              <span class="chip strike">Strike = -1 punto</span>
              <span class="chip bonus">Bonus = premio economico</span>
              <span class="chip neutral">Puntaje final = checks - strikes</span>
            </div>
            <p class="footnote">El sistema no solo ordena el ranking del mes: tambien impacta en comisiones, premios por KPIs y nivel de agenda disponible segun el puntaje final alcanzado.</p>
          </div>
        </section>

        <section class="section">
          <div class="section-head"><div><h2>Checkpoints y Strikes por Closer</h2><p>Motivos individuales con su puntaje final.</p></div></div>
          <div class="closers-grid">
            ${data.closers.map((closer) => `
              <article class="closer-card">
                <div class="closer-top">
                  <h3 class="closer-name">${escapeHtml(closer.name)}</h3>
                  <span class="score-pill score-${escapeHtml(closer.tone)}">${escapeHtml(closer.score)}</span>
                </div>
                <div class="subblock">
                  <h3>Checks</h3>
                  <ul class="reason-list ${closer.checks.length === 1 && closer.checks[0] === 'Ninguno.' ? 'empty' : ''}">
                    ${closer.checks.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
                  </ul>
                </div>
                <div class="subblock">
                  <h3>Strikes</h3>
                  <ul class="reason-list ${closer.strikes.length === 1 && closer.strikes[0] === 'Ninguno.' ? 'empty' : ''}">
                    ${closer.strikes.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
                  </ul>
                </div>
              </article>
            `).join('')}
          </div>
        </section>

        <section class="section two-col">
          <div class="panel">
            <div class="section-head"><div><h2>Ranking Final de Puntos</h2><p>Resultado final del sistema de checkpoints y strikes.</p></div></div>
            <div class="table-wrap"><table class="ranking-table"><thead><tr><th>Puesto</th><th>Closer</th><th class="align-r">Puntaje</th><th>Resultado</th></tr></thead><tbody>
              ${data.ranking.map(([rank, closer, score, result, tone]) => `
                <tr>
                  <td><span class="rank-badge">${escapeHtml(rank)}</span></td>
                  <td>${escapeHtml(closer)}</td>
                  <td class="align-r">${escapeHtml(score)}</td>
                  <td><span class="chip ${escapeHtml(tone)}">${escapeHtml(result)}</span></td>
                </tr>
              `).join('')}
            </tbody></table></div>
          </div>
          <div class="panel">
            <div class="section-head"><div><h2>KPIs Logrados por Closer</h2><p>Cantidad y tipo de indicadores cumplidos.</p></div></div>
            <div class="table-wrap"><table class="data-table"><thead><tr><th>Closer</th><th>KPIs</th><th class="align-r">Cantidad</th></tr></thead><tbody>
              ${data.kpis.map(([closer, kpi, qty]) => `<tr><td>${escapeHtml(closer)}</td><td>${escapeHtml(kpi)}</td><td class="align-r">${escapeHtml(qty)}</td></tr>`).join('')}
            </tbody></table></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head"><div><h2>Resultados Semanales - ${escapeHtml(data.monthLabel.split(' ')[0])}</h2><p>Desempeno del equipo y generacion de bonus por semana.</p></div></div>
          <div class="panel table-wrap"><table class="data-table"><thead><tr><th>Semana</th><th>Fechas</th><th class="align-r">Resultado Equipo</th><th>Estado</th><th class="align-r">Bonus</th></tr></thead><tbody>
            ${data.weeks.map(([week, dates, total, status, bonus, tone]) => `<tr><td>${escapeHtml(week)}</td><td>${escapeHtml(dates)}</td><td class="align-r">${escapeHtml(total)}</td><td><span class="chip ${escapeHtml(tone)}">${escapeHtml(status)}</span></td><td class="align-r">${escapeHtml(bonus)}</td></tr>`).join('')}
          </tbody></table></div>
        </section>

        <section class="section two-col">
          <div class="panel">
            <div class="section-head"><div><h2>Resultado Mensual por Closer</h2><p>Cash collected acumulado del mes.</p></div></div>
            <div class="bar-list">
              ${data.monthlyTotals.map(([closer, total, width]) => `
                <div class="bar-row">
                  <div class="bar-head"><strong>${escapeHtml(closer)}</strong><span>${escapeHtml(total)}</span></div>
                  <div class="bar-track"><div class="bar-fill" style="width:${Number(width)}%"></div></div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="panel">
            <div class="section-head"><div><h2>Bonus Generado y Distribucion</h2><p>La unica semana con bonus fue la semana 4.</p></div></div>
            <div class="bonus-callout">
              ${data.bonusCallouts.map(([label, value]) => `<div class="callout"><span class="stat-label">${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`).join('')}
            </div>
            <div class="table-wrap"><table class="data-table"><thead><tr><th>Closer</th><th class="align-r">Bonus Semana 4</th></tr></thead><tbody>
              ${data.bonusRows.map(([closer, bonus]) => `<tr><td>${escapeHtml(closer)}</td><td class="align-r">${escapeHtml(bonus)}</td></tr>`).join('')}
            </tbody></table></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head"><div><h2>Tabla de Premios y Consecuencias</h2><p>Regla completa del sistema para convertir puntaje en impacto economico.</p></div></div>
          <div class="panel table-wrap"><table class="data-table"><thead><tr><th class="align-r">Puntaje</th><th>Premio / Consecuencia</th></tr></thead><tbody>
            ${data.rewards.map(([score, consequence]) => `<tr><td class="align-r">${escapeHtml(score)}</td><td>${escapeHtml(consequence)}</td></tr>`).join('')}
          </tbody></table></div>
        </section>
      `;
    }

    function bindMonthPicker(){
      const input = document.getElementById('reportMonth');
      if(!input) return;
      input.addEventListener('change', () => {
        const next = new URL(window.location.href);
        next.searchParams.set('month', input.value);
        window.history.replaceState({}, '', next);
        renderPage(input.value);
      });
    }

    function renderPage(monthValue){
      const root = document.getElementById('reportRoot');
      const selectedMonth = monthValue || '2026-05';
      const report = REPORTS_BY_MONTH[selectedMonth];
      root.innerHTML = report ? renderReport(selectedMonth, report) : renderEmpty(selectedMonth);
      bindMonthPicker();
    }

    const params = new URLSearchParams(window.location.search);
    renderPage(params.get('month') || '2026-05');
  </script>
</body>
</html>
