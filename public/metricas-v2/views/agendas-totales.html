<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendas Totales | Métricas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/metricas/css/styles.css" />
  </head>
  <body class="ranking-page agenda-page">
    <main class="container">
      <div class="nav"><a href="/metricas">Volver al listado</a></div>
      <section class="ranking-hero">
        <h1>Agendas Totales</h1>
        <p>Vista mensual por origen y estrategia, con tabla y comparativas.</p>
      </section>

      <div class="actions ranking-actions">
        <label>
          Año
          <select id="anio"></select>
        </label>
        <label>
          Origen
          <select id="origen"></select>
        </label>
        <label>
          Estrategia
          <select id="estrategia"></select>
        </label>
        <button id="reload">Aplicar filtros</button>
      </div>

      <p id="status"></p>
      <section id="kpiContainer" class="cards"></section>
      <section id="tableContainer"></section>

    </main>

    <script src="/metricas/js/api/http.js"></script>
    <script src="/metricas/js/api/metricas.api.js"></script>
    <script src="/metricas/js/views/agendas.page.js"></script>
  </body>
</html>
