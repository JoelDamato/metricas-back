<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Personal</title>

  <style>
    :root{
      --bg:#F4F6FC;--white:#FFFFFF;--text:#18192A;--muted:#6B7290;--border:#E2E6F4;
      --blue:#3A7BF5;--blue-l:#EEF3FE;--green:#14B87A;--green-l:#E8F9F2;
      --amber:#E8950A;--amber-l:#FEF6E6;--red:#E84A4A;--red-l:#FEF0F0;
      --purple:#8B5CF6;--purple-l:#F0EDFE;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* SELECTOR */
    .selector-wrap{background:var(--text);padding:20px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .mag-badge{background:linear-gradient(135deg,var(--blue),var(--green));border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;letter-spacing:.1em;color:#fff;}
    .sel-label{font-size:13px;color:rgba(255,255,255,.5);}
    .closer-sel{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;outline:none;cursor:pointer;min-width:200px;}
    .closer-sel option{background:#1A1D2E;color:#fff;}
    .print-btn{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 16px;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
    .print-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
    .month-input,.pdf-upload-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
    .month-input::-webkit-calendar-picker-indicator{filter:invert(1);}
    .pdf-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%;}
    .pdf-download-link,.pdf-export-btn,.pdf-upload-btn{display:inline-flex;align-items:center;justify-content:center;min-height:36px;text-decoration:none;cursor:pointer;transition:all .2s;}
    .pdf-export-btn,.pdf-upload-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 14px;color:rgba(255,255,255,.78);font-family:'DM Sans',sans-serif;font-size:13px;}
    .pdf-export-btn:hover,.pdf-upload-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
    .pdf-download-link{border-radius:8px;padding:7px 14px;background:rgba(20,184,122,.14);border:1px solid rgba(20,184,122,.34);color:#8ef0c6;font-size:13px;font-weight:600;}
    .pdf-download-link.is-disabled{pointer-events:none;opacity:.6;}
    .pdf-status{font-size:12px;color:rgba(255,255,255,.58);}
    .pdf-hidden-input{display:none;}

    /* REPORT CONTAINER */
    .report{max-width:840px;margin:0 auto;padding:36px 24px 60px;}

    /* HERO */
    .report-hero{border-radius:20px;padding:36px 40px;margin-bottom:24px;position:relative;overflow:hidden;}
    .report-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.06),transparent 60%);}
    .rh-inner{position:relative;}
    .rh-eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px;}
    .rh-name{font-size:34px;font-weight:800;color:#fff;letter-spacing:-.03em;margin-bottom:6px;}
    .rh-period{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:20px;}
    .rh-chips{display:flex;gap:8px;flex-wrap:wrap;}
    .rh-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:500;color:rgba(255,255,255,.75);}

    /* KPI GRID */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px;}
    .kpi-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
    .kpi-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    .kpi-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;margin-bottom:2px;line-height:1.2;}
    .kpi-sub{font-size:11px;color:var(--muted);}
    .kpi-card.highlight{border-color:#A8E8CE;background:var(--green-l);}
    .kpi-card.highlight .kpi-val{color:var(--green);}
    .kpi-card.warn{border-color:#FAD98A;background:var(--amber-l);}
    .kpi-card.warn .kpi-val{color:var(--amber);}
    .kpi-card.danger{border-color:#F5B4B2;background:var(--red-l);}
    .kpi-card.danger .kpi-val{color:var(--red);}

    /* TWO COL */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
    @media(max-width:640px){.two-col{grid-template-columns:1fr;}}

    /* SECTION CARDS */
    .section-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:16px;}
    .sc-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
    .sc-icon{font-size:14px;}
    .item-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
    .item-list li{font-size:13px;color:var(--muted);line-height:1.65;display:flex;gap:9px;align-items:flex-start;}
    .item-list li strong{color:var(--text);}
    .item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px;}
    .item-dot.green{background:var(--green);}
    .item-dot.amber{background:var(--amber);}
    .item-dot.blue{background:var(--blue);}

    /* COMPARISON BARS */
    .comp-row{margin-bottom:14px;}
    .comp-row:last-child{margin-bottom:0;}
    .comp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .comp-lbl{font-size:12px;font-weight:500;}
    .comp-vals{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
    .comp-track{position:relative;height:8px;background:var(--bg);border-radius:4px;overflow:visible;}
    .comp-fill{height:100%;border-radius:4px;transition:width .6s ease;}
    .comp-avg-line{position:absolute;top:-3px;bottom:-3px;width:2px;border-radius:1px;background:var(--muted);opacity:.4;}
    .comp-avg-lbl{position:absolute;top:-16px;font-size:8px;color:var(--muted);transform:translateX(-50%);white-space:nowrap;}

    /* MESSAGE BOX */
    .message-box{border-radius:14px;padding:22px 24px;margin-bottom:16px;border:1px solid;}
    .message-box.personal{background:var(--text);border-color:var(--text);}
    .mb-eyebrow{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
    .message-box.personal .mb-eyebrow{color:rgba(255,255,255,.4);}
    .mb-text{font-size:14px;line-height:1.75;}
    .message-box.personal .mb-text{color:rgba(255,255,255,.75);}
    .message-box.personal .mb-text strong{color:#fff;}
    .message-box.sistema{background:var(--blue-l);border-color:#BDD0FD;}
    .message-box.sistema .mb-eyebrow{color:var(--blue);}
    .message-box.sistema .mb-text{color:#3A4A6A;font-size:13px;}
    .message-box.sistema .mb-text strong{color:var(--text);}

    /* STEPS */
    .steps{display:flex;flex-direction:column;gap:8px;}
    .step{display:flex;align-items:flex-start;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
    .step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
    .step-text{font-size:13px;color:var(--muted);line-height:1.6;padding-top:2px;}
    .step-text strong{color:var(--text);}

    /* EMPTY STATE */
    .empty{padding:60px 32px;text-align:center;color:var(--muted);}
    .empty-icon{font-size:40px;margin-bottom:12px;}
    .empty-text{font-size:14px;}

    /* PRINT */
    @media print{
      .selector-wrap{display:none;}
      .report{padding:20px;max-width:100%;}
      body{background:#fff;}
    }
  </style>

</head>

function fmtNum(n, unit) {
  if (unit === '$') {
    if (n >= 1000) return '$' + (n/1000).toFixed(0) + 'k';
    return '$' + n;
  }
  return n.toFixed(1) + '%';
}

function getCacheKey(closerKey, monthValue) {
  return `${closerKey || ''}::${monthValue || ''}`;
}

function escapeTextBlock(value) {
  return escapeHtml(value || '').replace(/\n/g, '<br />');
}

function getCurrentMonthValue() {
  const queryMonth = new URLSearchParams(window.location.search).get('month');
  if (/^\d{4}-\d{2}$/.test(queryMonth || '')) return queryMonth;
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
}

function renderGeneratedReport(payload) {
  const key = document.getElementById('sel').value;
  const el = document.getElementById('report');
  const monthValue = document.getElementById('reportMonth').value;
  const reportData = payload?.report || {};
  const metrics = payload?.metrics || {};
  const closerMetrics = metrics.closer || {};
  const teamAverages = metrics.teamAverages || {};
  const style = payload?.style || {};
  const color = style.color || '#3A7BF5';
  const colorDark = style.colorDark || '#1A3A8A';

  const kpiHTML = (reportData.kpis || []).map((k) => `
    <div class="kpi-card ${escapeHtml(k.cls || '')}">
      <div class="kpi-lbl">${escapeHtml(k.lbl || '')}</div>
      <div class="kpi-val">${escapeHtml(k.val || '')}</div>
      <div class="kpi-sub">${escapeHtml(k.sub || '')}</div>
    </div>`).join('');

  const compRows = [
    { lbl:'Cash Agendas Mes', tuVal:Number(closerMetrics.cashAgendasMes || 0), teamVal:Number(teamAverages.cashTotal || 0), max:Math.max(Number(closerMetrics.cashAgendasMes || 0), Number(teamAverages.cashTotal || 0), 1) * 1.2, invert:false, unit:'$' },
    { lbl:'Tasa de cierre', tuVal:Number(closerMetrics.cierrePct || 0), teamVal:Number(teamAverages.tasaCierre || 0), max:Math.max(Number(closerMetrics.cierrePct || 0), Number(teamAverages.tasaCierre || 0), 12), invert:false, unit:'%' },
    { lbl:'No asistidas', tuVal:Number(closerMetrics.noAsistidasPct || 0), teamVal:Number(teamAverages.pctNoAsistidas || 0), max:Math.max(Number(closerMetrics.noAsistidasPct || 0), Number(teamAverages.pctNoAsistidas || 0), 20), invert:true, unit:'%' },
    { lbl:'% Cobro agenda', tuVal:Number(closerMetrics.cashSobreFacturacionPct || 0), teamVal:Number(teamAverages.pctCobroAgenda || 0), max:Math.max(Number(closerMetrics.cashSobreFacturacionPct || 0), Number(teamAverages.pctCobroAgenda || 0), 20), invert:false, unit:'%' },
    { lbl:'Cash por agenda', tuVal:Number(closerMetrics.cashPorAgenda || 0), teamVal:Number(teamAverages.cashPorAgenda || 0), max:Math.max(Number(closerMetrics.cashPorAgenda || 0), Number(teamAverages.cashPorAgenda || 0), 1) * 1.2, invert:false, unit:'$' },
    { lbl:'Ticket promedio', tuVal:Number(closerMetrics.ticketPromedio || 0), teamVal:Number(teamAverages.ticketPromedio || 0), max:Math.max(Number(closerMetrics.ticketPromedio || 0), Number(teamAverages.ticketPromedio || 0), 1) * 1.2, invert:false, unit:'$' }
  ];

  const compHTML = compRows.map((row) => {
    const barW = Math.min((row.tuVal / row.max) * 100, 100);
    const avgW = Math.min((row.teamVal / row.max) * 100, 100);
    const isBetter = row.invert ? row.tuVal <= row.teamVal : row.tuVal >= row.teamVal;
    const barColor = isBetter ? 'var(--green)' : 'var(--amber)';
    return `<div class="comp-row">
      <div class="comp-header">
        <span class="comp-lbl">${escapeHtml(row.lbl)}</span>
        <span class="comp-vals">Vos: <b>${fmtNum(row.tuVal, row.unit)}</b> · Equipo: ${fmtNum(row.teamVal, row.unit)}</span>
      </div>
      <div class="comp-track">
        <div class="comp-fill" style="width:${barW}%;background:${barColor}"></div>
        <div class="comp-avg-line" style="left:${avgW}%">
          <div class="comp-avg-lbl">equipo</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const fortHTML = (reportData.fortalezas || []).map((item) =>
    `<li><div class="item-dot ${escapeHtml(item.dot || 'green')}"></div><span>${escapeTextBlock(item.txt)}</span></li>`).join('');
  const atenHTML = (reportData.atencion || []).map((item) =>
    `<li><div class="item-dot ${escapeHtml(item.dot || 'amber')}"></div><span>${escapeTextBlock(item.txt)}</span></li>`).join('');
  const stepsHTML = (reportData.pasos || []).map((step) =>
    `<div class="step">
      <div class="step-num" style="background:${escapeHtml(step.color || '#3A7BF5')}">${escapeHtml(step.num || '')}</div>
      <div class="step-text">${escapeTextBlock(step.txt)}</div>
    </div>`).join('');

  el.innerHTML = `
    <div class="report-hero" style="background:linear-gradient(135deg,${colorDark},${color})">
      <div class="rh-inner">
        <div class="rh-eyebrow">Reporte Personal · ${escapeHtml(payload.monthLabel || PERIOD_BY_MONTH(monthValue))}</div>
        <div class="rh-name">${escapeHtml(payload.closer || DATA[key]?.nombre || '')}</div>
        <div class="rh-period">${escapeHtml(payload.status || '')} · ranking #${escapeHtml(String(payload.rankingPosition || '-'))} de ${escapeHtml(String(payload.activeClosers || '-'))}</div>
        <div class="rh-chips">${(reportData.chips || []).map((chip) => `<span class="rh-chip">${escapeHtml(chip)}</span>`).join('')}</div>
      </div>
    </div>

    <div class="kpi-grid">${kpiHTML}</div>

    <div class="two-col">
      <div class="section-card">
        <div class="sc-title"><span class="sc-icon">💪</span> Tus fortalezas</div>
        <ul class="item-list">${fortHTML}</ul>
      </div>
      <div class="section-card">
        <div class="sc-title"><span class="sc-icon">🎯</span> A trabajar</div>
        <ul class="item-list">${atenHTML}</ul>
      </div>
    </div>

    <div class="section-card">
      <div class="sc-title"><span class="sc-icon">📊</span> Tus métricas vs el promedio del equipo</div>
      ${compHTML}
    </div>

    <div class="message-box personal">
      <div class="mb-eyebrow">Mensaje del mes</div>
      <div class="mb-text">${escapeTextBlock(reportData.mensaje)}</div>
    </div>

    <div class="section-card">
      <div class="sc-title"><span class="sc-icon">⬆️</span> Próximos pasos</div>
      <div class="steps">${stepsHTML}</div>
    </div>

    <div class="message-box sistema">
      <div class="mb-eyebrow">Tu posición en el nuevo sistema</div>
      <div class="mb-text">${escapeTextBlock(reportData.sistemaMsg)}</div>
    </div>`;

  refreshPdfState();
}

function downloadReportBase() {
  const { closerKey, monthValue, closerName } = getSelectedReportContext();
  const status = document.getElementById('pdfStatus');
  if (!closerKey) {
    status.textContent = 'Primero elegí un closer para exportar la base.';
    return;
  }

  const html = buildExportHtml(closerKey, monthValue);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const monthSafe = String(monthValue || 'sin-mes');
  const filename = `reporte-personal-${closerName.toLowerCase().replace(/[^a-z0-9]+/gi, '-')}-${monthSafe}.html`;
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
  status.textContent = 'Base descargada para armar el PDF.';
}

async function refreshPdfState() {
  const { closerKey, monthValue, closerName } = getSelectedReportContext();
  const status = document.getElementById('pdfStatus');
  const link = document.getElementById('downloadPdfLink');

  if (!closerKey || !monthValue) {
    link.href = '#';
    link.classList.add('is-disabled');
    status.textContent = 'Elegí closer y mes para gestionar el PDF.';
    return;
  }

  status.textContent = 'Buscando PDF cargado...';

  try {
    const response = await window.metricasApi.fetchCloserPersonalPdf({
      closer: closerName,
      month: monthValue
    });
    const pdf = response.pdf || {};

    if (pdf.exists && pdf.downloadUrl) {
      link.href = pdf.downloadUrl;
      link.classList.remove('is-disabled');
      status.textContent = 'Hay un PDF cargado para este closer y mes.';
    } else {
      link.href = '#';
      link.classList.add('is-disabled');
      status.textContent = 'Todavía no hay PDF cargado para este closer y mes.';
    }
  } catch (error) {
    link.href = '#';
    link.classList.add('is-disabled');
    status.textContent = error.message || 'No pude leer el PDF guardado.';
  }
}

async function uploadSelectedPdf(file) {
  const { closerKey, monthValue, closerName } = getSelectedReportContext();
  const status = document.getElementById('pdfStatus');

  if (!closerKey || !monthValue) {
    status.textContent = 'Elegí closer y mes antes de subir el PDF.';
    return;
  }

  if (!file) return;

  status.textContent = 'Subiendo PDF...';

  try {
    await window.metricasApi.uploadCloserPersonalPdf({
      closer: closerName,
      month: monthValue,
      filename: file.name,
      file
    });
    status.textContent = 'PDF subido correctamente.';
    await refreshPdfState();
  } catch (error) {
    status.textContent = error.message || 'No pude subir el PDF.';
  }
}

async function generateAiReport() {
  const { closerKey, monthValue, closerName } = getSelectedReportContext();
  const status = document.getElementById('pdfStatus');
  const reportNode = document.getElementById('report');

  if (!canGenerateCloserAiReport) {
    status.textContent = 'Solo Matías Randazzo o Leonardo Alaniz pueden generar reportes con GPT.';
    return;
  }

  if (!closerKey || !closerName) {
    status.textContent = 'Elegí un closer antes de generar el reporte.';
    return;
  }

  const cacheKey = getCacheKey(closerKey, monthValue);
  const cached = GENERATED_REPORT_CACHE.get(cacheKey);
  if (cached) {
    renderGeneratedReport(cached);
    status.textContent = 'Mostrando reporte generado previamente para ese closer y mes.';
    return;
  }

  reportNode.innerHTML = '<div class="empty"><div class="empty-icon">🤖</div><div class="empty-text">Generando reporte real del closer con GPT...</div></div>';
  status.textContent = 'Generando reporte con GPT...';

  try {
    const response = await window.metricasApi.generateCloserPersonalReport({
      closer: closerName,
      month: monthValue
    });
    GENERATED_REPORT_CACHE.set(cacheKey, response.report);
    renderGeneratedReport(response.report);
    status.textContent = `Reporte generado para ${closerName} en ${response.report.monthLabel}.`;
  } catch (error) {
    status.textContent = error.message || 'No pude generar el reporte con GPT.';
    renderReport();
  }
}

  const el  = document.getElementById('report');
  const monthValue = document.getElementById('reportMonth').value;
  const cached = GENERATED_REPORT_CACHE.get(getCacheKey(key, monthValue));
  if (!key) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Seleccioná un closer para ver su reporte personal.</div></div>';
    refreshPdfState();
    return;
  }
  if (cached) {
    renderGeneratedReport(cached);
    return;
  }
  const d = DATA[key];
  const c = d.color;

  // KPI cards
  const kpiHTML = d.kpis.map(k => `
    <div class="kpi-card ${k.cls}">
      <div class="kpi-lbl">${k.lbl}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');

  // Comparison bars
  const compHTML = d.comp.map(row => {
    const barW = Math.min((row.tuVal / row.max) * 100, 100);
    const avgW = Math.min((row.teamVal / row.max) * 100, 100);
    const isBetter = row.invert ? row.tuVal < row.teamVal : row.tuVal >= row.teamVal;
    const barColor = isBetter ? 'var(--green)' : 'var(--amber)';
    return `<div class="comp-row">
      <div class="comp-header">
        <span class="comp-lbl">${row.lbl}</span>
        <span class="comp-vals">Vos: <b>${fmtNum(row.tuVal, row.unit)}</b> · Equipo: ${fmtNum(row.teamVal, row.unit)}</span>
      </div>
      <div class="comp-track">
        <div class="comp-fill" style="width:${barW}%;background:${barColor}"></div>
        <div class="comp-avg-line" style="left:${avgW}%">
          <div class="comp-avg-lbl">equipo</div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Fortalezas
  const fortHTML = d.fortalezas.map(f =>
    `<li><div class="item-dot ${f.dot}"></div><span>${f.txt}</span></li>`).join('');

  // Atención
  const atenHTML = d.atencion.map(a =>
    `<li><div class="item-dot amber"></div><span>${a.txt}</span></li>`).join('');

  // Steps
  const stepsHTML = d.pasos.map(p =>
    `<div class="step">
      <div class="step-num" style="background:${p.color}">${p.num}</div>
      <div class="step-text">${p.txt}</div>
    </div>`).join('');

  el.innerHTML = `
    <!-- HERO -->
    <div class="report-hero" style="background:linear-gradient(135deg,${d.colorDark},${d.color})">
      <div class="rh-inner">
        <div class="rh-eyebrow">Reporte Personal · ${PERIOD_BY_MONTH(monthValue)}</div>
        <div class="rh-name">${d.nombre}</div>
        <div class="rh-period">${d.status} · ${d.meses} meses evaluados</div>
        <div class="rh-chips">${d.chips.map(ch=>`<span class="rh-chip">${ch}</span>`).join('')}</div>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">${kpiHTML}</div>

    <!-- Fortalezas + Atención -->
    <div class="two-col">
      <div class="section-card">
        <div class="sc-title"><span class="sc-icon">💪</span> Tus fortalezas</div>
        <ul class="item-list">${fortHTML}</ul>
      </div>
      <div class="section-card">
        <div class="sc-title"><span class="sc-icon">🎯</span> A trabajar</div>
        <ul class="item-list">${atenHTML}</ul>
      </div>
    </div>

    <!-- Comparativa -->
    <div class="section-card">
      <div class="sc-title"><span class="sc-icon">📊</span> Tus métricas vs el promedio del equipo</div>
      ${compHTML}
    </div>

    <!-- Mensaje personal -->
    <div class="message-box personal">
      <div class="mb-eyebrow">Mensaje del mes</div>
      <div class="mb-text">${d.mensaje}</div>
    </div>

    <!-- Próximos pasos -->
    <div class="section-card">
      <div class="sc-title"><span class="sc-icon">⬆️</span> Próximos pasos</div>
      <div class="steps">${stepsHTML}</div>
    </div>

    <!-- Sistema -->
    <div class="message-box sistema">
      <div class="mb-eyebrow">Tu posición en el nuevo sistema</div>
      <div class="mb-text">${d.sistemaMsg}</div>
    </div>`;

  refreshPdfState();
}

async function initAiPermissions() {
  const button = document.getElementById('generateAiReport');
  if (!button) return;

  try {
    const response = await window.http.getJson('/api/metricas/auth/session');
    canGenerateCloserAiReport = Boolean(response?.user?.permissions?.canGenerateCloserAiReport);
  } catch (error) {
    canGenerateCloserAiReport = false;
  }

  button.hidden = !canGenerateCloserAiReport;
}
</script>
</div>
<script src="/metricas/js/api/http.js"></script>
<script src="/metricas/js/api/metricas.api.js"></script>
<script>
document.getElementById('reportMonth').value = getCurrentMonthValue();
document.getElementById('reportMonth').addEventListener('change', renderReport);
document.getElementById('exportReportData').addEventListener('click', downloadReportBase);
document.getElementById('generateAiReport').addEventListener('click', generateAiReport);
document.getElementById('uploadPdfTrigger').addEventListener('click', () => {
  document.getElementById('pdfFileInput').click();
});
document.getElementById('pdfFileInput').addEventListener('change', async (event) => {
  const [file] = event.target.files || [];
  await uploadSelectedPdf(file);
  event.target.value = '';
});
refreshPdfState();
initAiPermissions();
</script>
<script src="/metricas/js/auth-shell.js"></script>
<script src="/metricas/js/mag-theme.js"></script>
</body>
</html>
