<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estado del contacto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/metricas/css/styles.css" />
    <link rel="stylesheet" href="/contacto-estado/styles.css" />
  </head>
  <body class="contact-status-page">
    <main class="page-shell">
      <section class="hero">
        <div class="hero-main">
          <a class="back-link" href="/metricas/dashboard.html">Volver al dashboard</a>
          <p class="eyebrow">Consulta rápida</p>
          <h1>Estado del contacto</h1>
          <p class="hero-copy">
            Una ficha clara, prolija y rápida para mostrar el estado actual del contacto, con sus datos principales y sus métricas comerciales.
          </p>
        </div>

        <aside class="hero-side">
          <p class="side-label">Búsqueda directa</p>
          <form id="lookupForm" class="lookup-form">
            <label class="field">
              <span>GHL ID</span>
              <input id="ghlIdInput" name="ghlId" type="text" placeholder="Ej: v8VEe7k9Huub94XJ6E9j" autocomplete="off" />
            </label>
            <button type="submit">Ver ficha</button>
          </form>
          <p class="side-note">Podés compartir la URL con el <code>GHL ID</code> ya incluido.</p>
        </aside>
      </section>

      <section id="statusBox" class="status-box" hidden></section>
      <section id="cardContainer" class="card-grid"></section>
    </main>

    <script src="/metricas/js/auth-shell.js"></script>
    <script src="/contacto-estado/app.js"></script>
  </body>
  </html>
